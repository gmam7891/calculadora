name: Analisa Tempo dos Slots

on:
  workflow_dispatch:
    inputs:
      vod_id:
        description: 'ID da VOD (ex: 2712188263)'
        required: true
        default: '2712188263'

jobs:
  analisar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar TwitchDownloaderCLI
        run: |
          wget https://github.com/lay295/TwitchDownloader/releases/download/1.56.4/TwitchDownloaderCLI-1.56.4-Linux-x64.zip
          unzip TwitchDownloaderCLI-1.56.4-Linux-x64.zip
          chmod +x TwitchDownloaderCLI

      - name: Pegar capítulos da VOD
        run: ./TwitchDownloaderCLI info --id ${{ inputs.vod_id }} --format json > vod_info.json

      - name: Calcular tempo dos jogos
        run: python3 -c '
import json, re
with open("vod_info.json") as f: data = json.load(f)
chapters = data.get("chapters") or []
print("# 🎰 Relatório de Tempo dos Slots - VOD ${{ inputs.vod_id }}")
print("| Jogo                          | Tempo (minutos) |")
print("|-------------------------------|-----------------|")
jogos = [
    ("Area Link™ Phoenix Firestorm", "Phoenix Firestorm|Area Link.*Phoenix"),
    ("Area Link™ Bank Boss", "Bank Boss|Area Link.*Bank"),
    ("Area Link™ Dragon", "Area Link.*Dragon|Dragon"),
    ("VoltedUP Wild", "VoltedUP Wild|VoltedUP"),
    ("Surge™", "Surge"),
    ("Wacky Panda Power Combo™", "Wacky Panda"),
    ("Squealin Riches 2™", "Squealin Riches"),
    ("Treasures of Mjolnir™", "Mjolnir"),
    ("FlyX™ Cash Turbo™", "FlyX|Cash Turbo")
]
total_area_link = 0
for nome, padrao in jogos:
    tempo_seg = 0
    regex = re.compile(padrao, re.IGNORECASE)
    for ch in chapters:
        titulo = str(ch.get("title") or ch.get("game") or "")
        if regex.search(titulo):
            seg = ch.get("length") or ch.get("lengthSeconds") or 0
            tempo_seg += int(seg)
    minutos = tempo_seg // 60
    print(f"| {nome:<30} | {minutos:>10} min  |")
    if "Area Link" in nome: total_area_link += minutos
print(f"\n**Total Família Area Link™: {total_area_link} minutos**")
print("\n✅ Análise concluída!")
' >> $GITHUB_STEP_SUMMARY
